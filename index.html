<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sveglia App CIE</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; }
        .bottone { background: #2b78e4; color: white; padding: 20px; border-radius: 10px; text-decoration: none; font-weight: bold; display: inline-block; font-size: 20px; }
    </style>
</head>
<body>
    <h2>Autorizzazione in corso...</h2>
    <br>
    <a id="tastone" href="#" class="bottone">PIGIAMI PER APRIRE L'APP</a>

    <script>
        // Prende il link della CIE dall'URL
        const urlParams = new URLSearchParams(window.location.search);
        const linkCIE = urlParams.get('c');

        if (linkCIE) {
            // TRUCCO: Aggiunge il prefisso magico che sveglia l'app
            const comandoSveglia = "cieid://auth?request=" + linkCIE;
            
            // Imposta il tastone blu con il comando sveglia
            document.getElementById('tastone').href = comandoSveglia;

            // Prova a farlo da solo senza che l'utente clicchi
            window.location.href = comandoSveglia;
        }
    </script>
</body>
</html>
