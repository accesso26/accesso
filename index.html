<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accesso Rapido CIE</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; }
        .tasto { background: #007bff; color: white; padding: 25px; border-radius: 12px; text-decoration: none; font-weight: bold; display: inline-block; font-size: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <h2>App CieID</h2>
    <p>Premi il tastone per autorizzare:</p>
    <br><br>
    <a id="linkSveglia" href="#" class="tasto">🚀 APRI APP ORA</a>

    <script>
        // Legge il link del QR che mandiamo da WhatsApp
        const urlParams = new URLSearchParams(window.location.search);
        const linkDelQR = urlParams.get('c');

        if (linkDelQR) {
            // AGGIUNGE IL PREFISSO MAGICO
            const comandoFinale = "cieid://auth?request=" + linkDelQR;
            
            // Collega il comando al tastone blu
            document.getElementById('linkSveglia').href = comandoFinale;

            // Forza l'apertura automatica (per i telefoni Android/iPhone moderni)
            window.location.href = comandoFinale;
        } else {
            document.body.innerHTML = "<h1>Link non ricevuto. Riprova.</h1>";
        }
    </script>
</body>
</html>
